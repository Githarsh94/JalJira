spring:
  application:
    name: JalJira

  # Import secrets from separate file (not committed to git)
  config:
    import: optional:classpath:application-secrets.yml

  datasource:
    # PostgreSQL (Supabase) - credentials loaded from application-secrets.yml
    # Or override with environment variables: DB_URL, DB_USERNAME, DB_PASSWORD
    url: ${DB_URL:jdbc:h2:mem:jaljiradb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: validate       # safe default: only validate schema, don't modify
    show-sql: false            # don't log SQL in production (may expose sensitive data)
    properties:
      hibernate:
        format_sql: true

# JWT configuration
jwt:
  secret: ${JWT_SECRET:jaljira-dev-secret-key-change-in-production-min-32-chars!!}
  expiration-ms: 86400000  # 24 hours

# OAuth2 credentials for server-side code exchange
app:
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:3000/auth/callback}

logging:
  level:
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080