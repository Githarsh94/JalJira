<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #e8f5e9; /* Light green background */
            font-family: Arial, sans-serif;
            color: #2e7d32; /* Dark green text color */
            padding: 20px;
        }
        h1 {
            color: #388e3c; /* Medium green for header */
        }
        .user-profile {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 600px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8f5e9;
        }
        .profile-picture {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-right: 20px;
            border: 3px solid #388e3c;
        }
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #388e3c;
        }
        .detail-row {
            margin: 15px 0;
            padding: 10px;
            background-color: #f1f8e9;
            border-radius: 5px;
        }
        .detail-label {
            font-weight: bold;
            color: #1b5e20;
            margin-right: 10px;
        }
        .detail-value {
            color: #2e7d32;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }
        .error {
            color: #c62828;
            padding: 20px;
            background-color: #ffebee;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Your Dashboard</h1>
    
    <div id="loading" class="loading">Loading your profile...</div>
    <div id="error" class="error" style="display: none;"></div>
    
    <div id="profile" class="user-profile" style="display: none;">
        <div class="profile-header">
            <img id="picture" class="profile-picture" src="" alt="Profile Picture">
            <div>
                <div class="profile-name" id="name">Name</div>
                <div id="email" style="color: #666;"></div>
            </div>
        </div>
        
        <div class="detail-row">
            <span class="detail-label">User ID:</span>
            <span class="detail-value" id="sub"></span>
        </div>
        
        <div class="detail-row">
            <span class="detail-label">Given Name:</span>
            <span class="detail-value" id="given_name"></span>
        </div>
        
        <div class="detail-row">
            <span class="detail-label">Family Name:</span>
            <span class="detail-value" id="family_name"></span>
        </div>
        
        <div class="detail-row">
            <span class="detail-label">Email Verified:</span>
            <span class="detail-value" id="email_verified"></span>
        </div>
        
        <div class="detail-row">
            <span class="detail-label">Locale:</span>
            <span class="detail-value" id="locale"></span>
        </div>
        
        <div id="additionalDetails"></div>
    </div>
    
    <script>
        fetch('/api/user/info')
            .then(response => {
                // Check if we got redirected to login page (status 302 or non-JSON response)
                const contentType = response.headers.get('content-type');
                
                // Handle authentication failures
                if (response.status === 401 || response.status === 403) {
                    console.log('User not authenticated, redirecting to login...');
                    window.location.href = '/';
                    return;
                }
                
                // Check if response is JSON
                if (!contentType || !contentType.includes('application/json')) {
                    console.log('Received non-JSON response, likely redirected to login page');
                    window.location.href = '/';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch user info: ${response.status} ${response.statusText}`);
                }
                
                return response.json();
            })
            .then(data => {
                // Check if data exists (might be undefined if redirected)
                if (!data) {
                    return;
                }
                
                console.log('User data:', data);
                
                // Hide loading, show profile
                document.getElementById('loading').style.display = 'none';
                document.getElementById('profile').style.display = 'block';
                
                // Set profile picture
                if (data.picture) {
                    document.getElementById('picture').src = data.picture;
                } else {
                    document.getElementById('picture').style.display = 'none';
                }
                
                // Set main details
                document.getElementById('name').textContent = data.name || 'N/A';
                document.getElementById('email').textContent = data.email || 'N/A';
                document.getElementById('sub').textContent = data.sub || 'N/A';
                document.getElementById('given_name').textContent = data.given_name || 'N/A';
                document.getElementById('family_name').textContent = data.family_name || 'N/A';
                document.getElementById('email_verified').textContent = data.email_verified ? 'Yes' : 'No';
                document.getElementById('locale').textContent = data.locale || 'N/A';
                
                // Display any additional attributes
                const additionalDetails = document.getElementById('additionalDetails');
                const displayedKeys = ['picture', 'name', 'email', 'sub', 'given_name', 'family_name', 'email_verified', 'locale'];
                
                Object.keys(data).forEach(key => {
                    if (!displayedKeys.includes(key)) {
                        const detailRow = document.createElement('div');
                        detailRow.className = 'detail-row';
                        
                        const labelSpan = document.createElement('span');
                        labelSpan.className = 'detail-label';
                        labelSpan.textContent = key + ':';
                        
                        const valueSpan = document.createElement('span');
                        valueSpan.className = 'detail-value';
                        valueSpan.textContent = JSON.stringify(data[key]);
                        
                        detailRow.appendChild(labelSpan);
                        detailRow.appendChild(valueSpan);
                        additionalDetails.appendChild(detailRow);
                    }
                });
            })
            .catch(error => {
                console.error('Error fetching user info:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading user profile: ' + error.message;
            });
    </script>
</body>
</html>
